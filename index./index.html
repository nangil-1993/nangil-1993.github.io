<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 홈페이지</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 60px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1 { color: #2d3748; font-size: 2.5rem; margin-bottom: 10px; }
    p  { color: #718096; font-size: 1.1rem; }
    .emoji { font-size: 4rem; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요!</h1>
    <p>nangil-1993의 홈페이지에 오신 걸 환영합니다.</p>
  </div>
</body>
</html>
